name: iOS Build & Deploy to App Store Connect

on:
  push:
    branches:
      - master
    tags:
      - 'v*'           # Also triggers on version tags like v0.21.1
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # inventree-app uses git submodules

      # ── 2. Flutter setup ─────────────────────────────────────────────────────
      - name: Read Flutter version from .fvmrc
        id: flutter_version
        run: |
          VERSION=$(cat .fvmrc | python3 -c "import sys,json; print(json.load(sys.stdin)['flutter'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          channel: stable
          cache: true

      # ── 3. Dependencies ───────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Fastlane
        run: |
          cd ios
          bundle install

      # ── 4. Code Signing via App Store Connect API ─────────────────────────────
      #   Uses Fastlane's "match" in readonly mode to fetch certs from your
      #   private certs repo, authenticated via App Store Connect API key.
      - name: Setup code signing
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          bundle exec fastlane match appstore --readonly

      # ── 5. Build ──────────────────────────────────────────────────────────────
      - name: Build iOS release (.ipa)
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      # ── 6. Upload to TestFlight via Fastlane ──────────────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          cd ios
          bundle exec fastlane deploy

      # ── 7. Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Build or upload failed. Check the logs above."
